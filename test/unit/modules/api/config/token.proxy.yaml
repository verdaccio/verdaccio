storage: ./storage

auth:
  htpasswd:
    file: ./htpasswd

# trust the (test) proxy so req.ip is derived from X-Forwarded-For
server:
  trustProxy: true

packages:
  '@token/*':
    access: $authenticated
    publish: $authenticated
  'only-you-can-publish':
    access: $authenticated
    publish: $authenticated

log: { type: stdout, format: pretty, level: debug }
