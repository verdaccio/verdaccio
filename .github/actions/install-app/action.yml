name: 'Install app'
description: 'install application'

inputs:
  registry-url:
    description: 'Registry URL for pnpm'
    required: false
    default: 'https://registry.npmjs.org/'
  reporter:
    description: 'Reporter for pnpm'
    required: false
    default: 'silent'
  loglevel:
    description: 'Log level for pnpm'
    required: false
    default: 'error'
  node-version:
    description: 'Node.js version to use (overrides .nvmrc when set)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Use Node from input
      if: inputs.node-version != ''
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
    - name: Use Node from .nvmrc
      if: inputs.node-version == ''
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'
    - name: Install pnpm
      run: |
        npm install --global corepack@latest
        corepack enable
        corepack prepare
      shell: bash
    - name: set store
      run: |
        if [ ! -d "$HOME/.pnpm-store" ]; then
          mkdir -p $HOME/.pnpm-store
          pnpm config set store-dir $HOME/.pnpm-store
        else
          echo "Store directory already exists. Skipping configuration."
        fi
      shell: bash
    - name: Restore cache pnpm store
      uses: ./.github/actions/cache-store
    - name: Install
      run: pnpm install --reporter=${{inputs.reporter}} --ignore-scripts --registry ${{ inputs.registry-url }} --loglevel=${{ inputs.loglevel }}
      shell: bash
    - name: Save cache pnpm store
      if: steps.cache-npm.outputs.cache-hit == 'false'
      uses: ./.github/actions/cache-store
