name: 'Install app with Node specific version'
description: 'install application'

inputs:
  registry-url:
    description: 'Registry URL for pnpm'
    required: false
    default: 'https://registry.npmjs.org'
  reporter:
    description: 'Reporter for pnpm'
    required: false
    default: 'silent'
  loglevel:
    description: 'Log level for pnpm'
    required: false
    default: 'error'
  node-version:
    description: 'Node.js version to use'
    required: true

runs:
  using: composite
  steps:
    - name: Install pnpm
      run: |
        npm install --global corepack@latest
        corepack enable
        corepack prepare
      shell: bash
    - name: Use Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    - name: Install
      run: pnpm install --reporter=${{inputs.reporter}} --ignore-scripts --registry ${{ inputs.registry-url }} --loglevel=${{ inputs.loglevel }}
      shell: bash
