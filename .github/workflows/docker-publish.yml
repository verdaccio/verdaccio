name: Docker publish to docker.io

on:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.repository == 'verdaccio/verdaccio'
    # Gate the master-branch (nightly) publish behind the `docker` environment,
    # which requires manual approval. Tag-triggered (v*) releases get an empty
    # environment, so they run without the gate (and aren't blocked by the
    # master-only branch policy).
    environment: ${{ github.ref == 'refs/heads/master' && 'docker' || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Fetch UI translations before `COPY . .`, else the image ships an
      # English-only UI (ui-theme bundles them from gitignored download_translations/).
      - name: Install dependencies
        uses: ./.github/actions/install-app

      - name: crowdin download
        env:
          # download-only token, exposed under the name crowdin.yaml expects
          CROWDIN_VERDACCIO_API_KEY: ${{ secrets.CROWDIN_VERDACCIO_API_DOWNLOAD }}
          CONTEXT: production
        run: pnpm crowdin:download

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        with:
          driver-opts: network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Docker image tags
        id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ github.repository }}
          tags: |
            type=raw,value=nightly-master
            type=raw,value=latest,enable=false
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.created=${{ steps.docker_meta.outputs.created }}
            org.opencontainers.image.version=${{ steps.docker_meta.outputs.version }}

      - name: Build & Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          provenance: mode=max
          sbom: true
