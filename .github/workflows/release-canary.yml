name: Release Canary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    name: Publish Canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Set canary version and scope
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g')
          CANARY_VERSION="${CURRENT_VERSION}-canary.${SHORT_SHA}.${BRANCH}"
          echo "canary_version=${CANARY_VERSION}" >> "$GITHUB_OUTPUT"
          # Temporarily rename package for canary publish (not committed)
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@verdaccio-canary/verdaccio';
            pkg.version = '${CANARY_VERSION}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing @verdaccio-canary/verdaccio@${CANARY_VERSION}"

      - name: Publish canary
        run: |
          npm config set "//registry.npmjs.org/:_authToken" "${REGISTRY_AUTH_TOKEN}"          
        env:
          REGISTRY_AUTH_TOKEN: ${{ secrets.REGISTRY_AUTH_TOKEN }}

      - name: Summary
        run: |
          echo "### Canary Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.canary_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install @verdaccio-canary/verdaccio@${{ steps.version.outputs.canary_version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
