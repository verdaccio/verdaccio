name: E2E CLI Tests

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: e2e-cli-${{ github.ref }}-6x
  cancel-in-progress: true

jobs:
  e2e-cli:
    name: E2E CLI (${{ matrix.pm }}, Node ${{ matrix.node_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: [18, 22, 24, 26]
        # npm@next-12 is pinned to 12.0.0-pre.0.0: the moving next-12 tag now
        # points to 12.0.0-pre.1, a broken canary whose bundled libnpmpublish
        # requires `sigstore` but npm no longer bundles it, breaking publish.
        pm: [npm@10, npm@11, npm@12.0.0-pre.0.0, pnpm@11, pnpm@10, yarn-classic, yarn-modern@4]
        exclude:
          # pnpm@11 requires Node 20+
          - node_version: 18
            pm: pnpm@11
          - node_version: 18
            pm: npm@12.0.0-pre.0.0
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Use Node ${{ matrix.node_version }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install pnpm
        if: matrix.pm == 'pnpm'
        run: npm install -g pnpm

      - name: Install dependencies
        run: yarn install

      - name: Build Verdaccio
        run: yarn build

      - name: Start Verdaccio
        run: |
          node bin/verdaccio &
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done

      - name: Run E2E CLI tests
        run: yarn verdaccio-e2e --registry http://localhost:4873 --pm ${{ matrix.pm }} -v 

      - name: Show Verdaccio logs
        if: always()
        run: cat ~/.config/verdaccio/verdaccio.log 2>/dev/null || echo "No log file found"
