name: E2E CLI Tests

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: e2e-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Verdaccio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            packages/*/build
            packages/*/dist
            packages/*/*/build
            packages/*/*/dist
            packages/plugins/ui-theme/static
          key: e2e-build-${{ github.sha }}

  e2e-cli:
    name: E2E CLI (${{ matrix.pm }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        pm:
          - npm@7
          - npm@8
          - npm@9
          - npm@10
          - npm@11
          - yarn-classic
          - yarn-modern@2
          - yarn-modern@3
          - yarn-modern@4
          - pnpm@9
          - pnpm@10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/build
            packages/*/dist
            packages/*/*/build
            packages/*/*/dist
            packages/plugins/ui-theme/static
          key: e2e-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Verdaccio
        run: |
          node packages/verdaccio/bin/verdaccio &
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done

      - name: Run E2E CLI tests
        run: pnpm verdaccio-e2e --registry http://localhost:4873 --pm ${{ matrix.pm }} -v

      - name: Show Verdaccio logs
        if: always()
        run: cat ~/.config/verdaccio/verdaccio.log 2>/dev/null || echo "No log file found"
