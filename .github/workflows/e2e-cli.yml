name: E2E CLI Tests

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: e2e-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-cli:
    name: E2E CLI (${{ matrix.pm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pm:
          - npm@7
          - npm@8
          - npm@9
          - npm@10
          - npm@11
          - yarn-classic
          - yarn-modern@2
          - yarn-modern@3
          - yarn-modern@4
          - pnpm@9
          - pnpm@10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install

      - name: Build Verdaccio
        run: pnpm build

      - name: Start Verdaccio
        run: |
          node packages/verdaccio/debug/bootstrap.js &
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done

      - name: Run E2E CLI tests
        run: pnpm verdaccio-e2e --registry http://localhost:4873 --pm ${{ matrix.pm }} -v

      - name: Show Verdaccio logs
        if: always()
        run: cat ~/.config/verdaccio/verdaccio.log 2>/dev/null || echo "No log file found"
