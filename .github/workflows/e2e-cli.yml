name: E2E CLI Tests

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: e2e-cli-${{ github.ref }}-6x
  cancel-in-progress: true

jobs:
  e2e-cli:
    name: E2E CLI (${{ matrix.pm }}, Node ${{ matrix.node_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: [18]
        pm: [npm, pnpm, yarn-classic, yarn-modern@4]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Use Node ${{ matrix.node_version }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install pnpm
        if: matrix.pm == 'pnpm'
        run: npm install -g pnpm

      - name: Install dependencies
        run: yarn install

      - name: Build Verdaccio
        run: yarn build

      - name: Start Verdaccio
        run: |
          node bin/verdaccio &
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done

      - name: Run E2E CLI tests
        run: yarn verdaccio-e2e --registry http://localhost:4873 --pm ${{ matrix.pm }} -v

      - name: Show Verdaccio logs
        if: always()
        run: cat ~/.config/verdaccio/verdaccio.log 2>/dev/null || echo "No log file found"
