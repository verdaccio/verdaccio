name: Changesets

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  CI: true
  PNPM_CACHE_FOLDER: .pnpm-store

jobs:
  # Open/refresh the version PR from changesets. Runs freely (no env gate, no publish).
  version:
    timeout-minutes: 14
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.repository == 'verdaccio/verdaccio'
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install dependencies with a custom registry
        uses: ./.github/actions/install-app
      - name: crowdin download
        env:
          CROWDIN_VERDACCIO_API_KEY: ${{ secrets.CROWDIN_VERDACCIO_API_KEY }}
          CONTEXT: production
        run: pnpm crowdin:download
      - name: build
        run: pnpm build
      - name: create versions
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d
        with:
          version: pnpm ci:version
          commit: 'chore: update versions'
          title: 'chore: update versions'
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_RELEASE_TOKEN }}

  # Publish to npm once the version PR is merged (no changesets left).
  # Gated by the `npm` environment, which requires manual approval.
  publish:
    needs: version
    if: needs.version.outputs.hasChangesets == 'false'
    timeout-minutes: 14
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install dependencies with a custom registry
        uses: ./.github/actions/install-app
      - name: crowdin download
        env:
          CROWDIN_VERDACCIO_API_KEY: ${{ secrets.CROWDIN_VERDACCIO_API_KEY }}
          CONTEXT: production
        run: pnpm crowdin:download
      - name: build
        run: pnpm build
      - name: publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d
        with:
          publish: pnpm ci:publish
          createGithubReleases: false
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_RELEASE_TOKEN }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
