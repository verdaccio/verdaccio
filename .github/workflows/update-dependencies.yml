name: update verdaccio 7.x dependencies 

# Manually triggered: bumps verdaccio packages (@verdaccio/*, verdaccio,
# verdaccio-*) to the versions published under a given npm dist-tag — the same
# versions a Changesets release PR carries — and opens a PR against 7.x.
on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag to bump verdaccio packages to'
        required: true
        default: 'next-9'
  push:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: github.repository == 'verdaccio/verdaccio'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 7.x
          fetch-depth: 0

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update verdaccio packages to the dist-tag
        env:
          DIST_TAG: ${{ github.event.inputs.dist_tag || 'next-9' }}
        # Exclude packages that are not part of this release line (not published
        # under $DIST_TAG): e2e-cli, e2e-ui and eslint-config.
        run: |
          pnpm update -r \
            "@verdaccio/*@$DIST_TAG" "verdaccio@$DIST_TAG" "verdaccio-*@$DIST_TAG" \
            "!@verdaccio/e2e-cli" "!@verdaccio/e2e-ui" "!@verdaccio/eslint-config"

      - name: Stop if nothing changed
        id: diff
        run: |
          if git diff --quiet -- '*.json' pnpm-lock.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build
        if: steps.diff.outputs.changed == 'true'
        run: pnpm build

      - name: Create or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIST_TAG: ${{ github.event.inputs.dist_tag || 'next-9' }}
        run: |
          # Stable branch: the working tree is already rebased on the latest
          # 7.x (checked out above), so force-pushing it rebases any existing PR.
          BRANCH="chore/update-verdaccio-dependencies"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Generate a changeset (stable filename so re-runs overwrite it).
          printf '%s\n' \
            "---" \
            "'verdaccio': patch" \
            "---" \
            "" \
            "Update verdaccio dependencies (\`@verdaccio/*\`, \`verdaccio\`, \`verdaccio-*\`) to the \`$DIST_TAG\` npm dist-tag." \
            > .changeset/update-verdaccio-dependencies.md

          git add -A
          git commit -m "chore: update verdaccio 7.x dependencies"
          git push --force origin "$BRANCH"

          if [ -n "$(gh pr list --head "$BRANCH" --base 7.x --state open --json number --jq '.[].number')" ]; then
            echo "Existing PR found — branch force-pushed (rebased onto latest 7.x)."
          else
            gh pr create \
              --base 7.x \
              --head "$BRANCH" \
              --title "chore: update verdaccio 7.x dependencies" \
              --body "Automated update of verdaccio packages only — \`@verdaccio/*\`, \`verdaccio\`, and \`verdaccio-*\` — to the \`$DIST_TAG\` npm dist-tag. Triggered manually via the **update verdaccio 7.x dependencies** workflow.

          $(git diff --stat HEAD~1)"
          fi
