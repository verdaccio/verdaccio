name: update verdaccio 6.x dependencies

# Manually triggered: bumps verdaccio packages (@verdaccio/*, verdaccio,
# verdaccio-*) to their `latest` npm dist-tag — except @verdaccio/ui-theme,
# which tracks the `next-9` line — and opens a PR against 6.x.
on:
  workflow_dispatch:
  push:
    # Don't re-trigger on the workflow's own PR branch (avoids a self-loop).
    branches-ignore:
      - chore/update-verdaccio-dependencies-6.x

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: github.repository == 'verdaccio/verdaccio'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 6.x
          fetch-depth: 0

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Update verdaccio packages
        # Bump the production verdaccio dependencies (@verdaccio/*, verdaccio,
        # verdaccio-*) to their `latest` dist-tag, except @verdaccio/ui-theme
        # which tracks `next-9`. Packages that are not part of this release line
        # are excluded, mirroring 7.x: @verdaccio/e2e-cli, @verdaccio/e2e-ui and
        # @verdaccio/eslint-config. (Those live in devDependencies here, but the
        # exclusion is kept explicit so they are never bumped by accident.)
        run: |
          PKGS=$(node -e "
            const deps = require('./package.json').dependencies;
            const EXCLUDE = ['@verdaccio/e2e-cli', '@verdaccio/e2e-ui', '@verdaccio/eslint-config', '@verdaccio/ui-theme'];
            const out = Object.keys(deps)
              .filter((n) => n.startsWith('@verdaccio/') || n.startsWith('verdaccio-') || n === 'verdaccio')
              .filter((n) => EXCLUDE.indexOf(n) === -1)
              .map((n) => n + '@latest');
            process.stdout.write(out.join(' '));
          ")
          yarn up $PKGS
          yarn up "@verdaccio/ui-theme@next-9"

      - name: Stop if nothing changed
        id: diff
        run: |
          if git diff --quiet -- '*.json' yarn.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize updated dependencies
        id: summary
        if: steps.diff.outputs.changed == 'true'
        # Compare the committed package.json (pre-update) against the working
        # tree to list exactly which verdaccio packages moved, and to what
        # version. The resulting markdown bullet list is reused by both the
        # changeset and the PR body so they document the real changes.
        run: |
          git show HEAD:package.json > "$RUNNER_TEMP/package.old.json"
          node -e "
            const fs = require('fs');
            const read = (p) => JSON.parse(fs.readFileSync(p, 'utf8'));
            const oldP = read('$RUNNER_TEMP/package.old.json');
            const newP = read('./package.json');
            const merge = (p) => ({ ...(p.dependencies || {}), ...(p.devDependencies || {}) });
            const a = merge(oldP), b = merge(newP);
            const lines = Object.keys(b)
              .filter((n) => n.startsWith('@verdaccio/') || n.startsWith('verdaccio-') || n === 'verdaccio')
              .filter((n) => a[n] !== b[n])
              .sort()
              .map((n) => '- \`' + n + '\`: \`' + (a[n] || '—') + '\` → \`' + b[n] + '\`');
            fs.writeFileSync('$RUNNER_TEMP/updated-deps.md', lines.join('\n') + '\n');
          "
          echo 'Updated packages:'
          cat "$RUNNER_TEMP/updated-deps.md"

      - name: Verify build
        if: steps.diff.outputs.changed == 'true'
        run: yarn build

      - name: Create or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stable branch: the working tree is already rebased on the latest
          # 6.x (checked out above), so force-pushing it rebases any existing PR.
          BRANCH="chore/update-verdaccio-dependencies-6.x"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Generate a changeset (stable filename so re-runs overwrite it). The
          # body lists every bumped package, old → new, from the summary step.
          {
            echo "---"
            echo "'verdaccio': patch"
            echo "---"
            echo ""
            echo "Update verdaccio dependencies to the \`latest\` npm dist-tag (\`@verdaccio/ui-theme\` tracks \`next-9\`):"
            echo ""
            cat "$RUNNER_TEMP/updated-deps.md"
          } > .changeset/update-verdaccio-dependencies.md

          # Format updated package.json files and the changeset before committing.
          yarn format

          git add -A
          git commit -m "chore: update verdaccio 6.x dependencies"
          git push --force origin "$BRANCH"

          # Compose the PR body (built after the commit so the diff stat against
          # HEAD~1 reflects exactly this update).
          BODY="$RUNNER_TEMP/pr-body.md"
          {
            echo "Automated update of verdaccio packages — \`@verdaccio/*\`, \`verdaccio\`, and \`verdaccio-*\` — to the \`latest\` npm dist-tag (\`@verdaccio/ui-theme\` tracks \`next-9\`). Triggered via the **update verdaccio 6.x dependencies** workflow."
            echo ""
            echo "Excluded (not part of the 6.x release line): \`@verdaccio/e2e-cli\`, \`@verdaccio/e2e-ui\`, \`@verdaccio/eslint-config\`."
            echo ""
            echo "## Updated packages"
            echo ""
            cat "$RUNNER_TEMP/updated-deps.md"
            echo ""
            echo "<details><summary>Diff stat</summary>"
            echo ""
            echo '```'
            git diff --stat HEAD~1
            echo '```'
            echo ""
            echo "</details>"
          } > "$BODY"

          if [ -n "$(gh pr list --head "$BRANCH" --base 6.x --state open --json number --jq '.[].number')" ]; then
            echo "Existing PR found — updating its body (branch force-pushed, rebased onto latest 6.x)."
            gh pr edit "$BRANCH" --body-file "$BODY"
          else
            gh pr create \
              --base 6.x \
              --head "$BRANCH" \
              --title "chore: update verdaccio 6.x dependencies" \
              --body-file "$BODY"
          fi
