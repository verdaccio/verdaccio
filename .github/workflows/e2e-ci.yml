name: E2E CLI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: e2e-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: setup e2e verdaccio
    services:
      verdaccio:
        image: verdaccio/verdaccio:nightly-master
        ports:
          - 4873:4873
        env:
          NODE_ENV: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies with a custom registry
        uses: ./.github/actions/install-app

  build:
    needs: [prepare]
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build application
        uses: ./.github/actions/build-app
        with:
          node-version-file: '.nvmrc'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            packages/**/build
            !packages/**/node_modules
          retention-days: 1

  e2e-cli-npm:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        pkg:
          [
            npm10,
            npm11,
          ]
    name: ${{ matrix.pkg }} / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-output
      - name: Install dependencies
        uses: ./.github/actions/install-app-node
        with:
          node-version-file: '.nvmrc'
          reporter: 'default'
          loglevel: 'debug'
      - name: Test CLI
        run: cd e2e/cli/e2e-${{matrix.pkg}} && NODE_ENV=production pnpm test

  e2e-cli-pnpm:
    needs: [build]
    strategy:
      fail-fast: true
      matrix:
        pkg:
          [
            pnpm9,
            pnpm10,
          ]
    name: ${{ matrix.pkg }} / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - name: Install dependencies
        uses: ./.github/actions/install-app-node
        with:
          node-version-file: '.nvmrc'
          reporter: 'default'
          loglevel: 'debug'
      - name: Test CLI
        run: cd e2e/cli/e2e-${{matrix.pkg}} && NODE_ENV=production pnpm test

  e2e-cli-yarn:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        pkg:
          [
            yarn1,
            yarn4
          ]
    name: ${{ matrix.pkg }} / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-output
      - name: Install dependencies
        uses: ./.github/actions/install-app-node
        with:
          node-version-file: '.nvmrc'
          reporter: 'default'
          loglevel: 'debug'
      - name: Test CLI
        run: cd e2e/cli/e2e-${{matrix.pkg}} && NODE_ENV=production pnpm test
