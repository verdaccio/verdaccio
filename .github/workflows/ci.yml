name: CI

on:
  push:
    branches:
      - '8.x'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - .changeset/**
      - .github/workflows/ci.yml
      - 'packages/**'
      - 'test/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
permissions:
  actions: read
  contents: read
  security-events: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changeset-check:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.actor != 'renovate[bot]' &&
      github.actor != 'dependabot[bot]' &&
      github.head_ref != 'changeset-release/8.x'
    runs-on: ubuntu-latest
    name: Changeset file check
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check changeset
        uses: ./.github/actions/changeset-check
  prepare:
    needs: [changeset-check]
    # Avoid running on draft PRs; always() allows this to proceed when changeset-check is skipped (Renovate)
    if: ${{ always() && !failure() && !cancelled() && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    name: setup
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        uses: ./.github/actions/install-app
  lint-and-format:
    runs-on: ubuntu-latest
    name: Lint & Format
    needs: prepare
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        uses: ./.github/actions/install-app
        with:
          reporter: 'default'
      - name: Lint
        run: pnpm lint
      - name: Format
        run: pnpm format:check
  build:
    needs: [lint-and-format]
    if: ${{ always() && !failure() && !cancelled() }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        node_version: [24, 26]
    name: Build / ${{ matrix.os }} / Node ${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build application with Node ${{ matrix.node_version }}
        uses: ./.github/actions/build-app
        with:
          node-version: ${{ matrix.node_version }}
      - name: Cache build artifacts
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            packages/*/build
            packages/*/dist
            packages/*/*/build
            packages/*/*/dist
          key: ci-build-${{ github.sha }}-node-${{ matrix.node_version }}
  test:
    needs: [build]
    if: ${{ github.event_name == 'pull_request' && !failure() && !cancelled() }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        node_version: [24, 26]
    name: Test / ${{ matrix.os }} / Node ${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        uses: ./.github/actions/install-app
        with:
          node-version: ${{ matrix.node_version }}
      - name: Restore build artifacts
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            packages/*/build
            packages/*/dist
            packages/*/*/build
            packages/*/*/dist
          key: ci-build-${{ github.sha }}-node-${{ matrix.node_version }}
          fail-on-cache-miss: true
      - name: Test (Node 26)
        if: matrix.node_version == 26
        run: pnpm test
        env:
          NODE_OPTIONS: --no-webstorage
      - name: Test (Other Node)
        if: matrix.node_version != 26
        run: pnpm test
  e2e:
    needs: [build]
    if: ${{ github.event_name == 'pull_request' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    name: E2E / Node ${{ matrix.node_version }}
    strategy:
      fail-fast: true
      matrix:
        node_version: [24, 26]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
      - name: Install pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare
      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build
        run: pnpm build
      - name: E2E Tests
        run: pnpm test:e2e
  changeset-validation:
    needs: [test]
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == false && always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    name: Changeset validation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        uses: ./.github/actions/install-app
      - name: Run changeset version
        run: pnpm ci:version:changeset
  cleanup:
    needs: [test, e2e, changeset-validation]
    if: always()
    runs-on: ubuntu-latest
    name: Cleanup caches
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Delete build artifact caches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache delete "ci-build-${{ github.sha }}-node-24" --repo ${{ github.repository }} || true
          gh cache delete "ci-build-${{ github.sha }}-node-26" --repo ${{ github.repository }} || true
