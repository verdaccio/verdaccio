name: CI

on:
  push:
    branches:
      - 'master'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - .github/workflows/ci.yml
      - 'src/**'
      - 'test/**'
      - 'docker-examples/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}-7x
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    name: Lint & Format
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
      - name: Enable corepack
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Format
        run: pnpm format:check

  build:
    needs: [lint-and-format]
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        node_version: [24, 25]
    name: Build / ${{ matrix.os }} / Node ${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node_version }}
      - name: Enable corepack
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: build/
          key: ci-build-${{ github.sha }}-node-${{ matrix.node_version }}

  test:
    needs: [build]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        node_version: [24, 25]
    name: Test / ${{ matrix.os }} / Node ${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node_version }}
      - name: Enable corepack
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: build/
          key: ci-build-${{ github.sha }}-node-${{ matrix.node_version }}
          fail-on-cache-miss: true
      - name: Test (Node 25)
        if: matrix.node_version == 25
        run: pnpm test
        env:
          NODE_OPTIONS: --no-webstorage
      - name: Test (Other Node)
        if: matrix.node_version != 25
        run: pnpm test

  test-docker:
    needs: [build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Test Docker Build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build Docker image
        run: docker build -t verdaccio-test .
        env:
          VERDACCIO_BUILD_REGISTRY: https://registry.npmjs.org
      - name: Run Verdaccio in background
        run: |
          docker run -d --name verdaccio-test -p 4873:4873 verdaccio-test
          sleep 10
      - name: Test npm install from local Verdaccio
        run: |
          npm set registry http://localhost:4873
          npm install -g verdaccio
      - name: Show Verdaccio logs
        if: always()
        run: docker logs verdaccio-test
      - name: Stop Verdaccio
        if: always()
        run: docker stop verdaccio-test

  e2e-cli:
    needs: [build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: E2E CLI (${{ matrix.pm }})
    strategy:
      fail-fast: false
      matrix:
        pm:
          - npm@7
          - npm@8
          - npm@9
          - npm@10
          - npm@11
          - yarn-classic
          - yarn-modern@2
          - yarn-modern@3
          - yarn-modern@4
          - pnpm@9
          - pnpm@10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
      - name: Enable corepack
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: build/
          key: ci-build-${{ github.sha }}-node-24
          fail-on-cache-miss: true
      - name: Start Verdaccio
        run: |
          node bin/verdaccio &
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done
      - name: Run E2E CLI tests
        run: pnpm verdaccio-e2e --registry http://localhost:4873 --pm ${{ matrix.pm }} -v
      - name: Show Verdaccio logs
        if: always()
        run: cat ~/.config/verdaccio/verdaccio.log 2>/dev/null || echo "No log file found"

  codeql:
    needs: [test, e2e-cli]
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == false && always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@51f77329afa6477de8c49fc9c7046c15b9a4e79d # v3.29.5
      - name: Autobuild
        uses: github/codeql-action/autobuild@51f77329afa6477de8c49fc9c7046c15b9a4e79d # v3.29.5
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@51f77329afa6477de8c49fc9c7046c15b9a4e79d # v3.29.5

  cleanup:
    needs: [test, e2e-cli, codeql]
    if: always()
    runs-on: ubuntu-latest
    name: Cleanup caches
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Delete build artifact caches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache delete "ci-build-${{ github.sha }}-node-24" --repo ${{ github.repository }} || true
          gh cache delete "ci-build-${{ github.sha }}-node-25" --repo ${{ github.repository }} || true
