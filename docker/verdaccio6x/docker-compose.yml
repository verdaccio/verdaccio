# Verdaccio 6.x running against the locally-built @verdaccio/* packages.
# The build context (dist/) is generated by prepare.mjs before `docker compose build`.
services:
  verdaccio:
    build:
      context: .
      dockerfile: Dockerfile
    image: verdaccio-6x-local
    container_name: verdaccio-6x-local
    ports:
      - '4873:4873'
      - '9229:9229' # Node inspector (--inspect)
    environment:
      # Configurable from the shell, e.g.:
      #   DEBUG='verdaccio:plugin:package-filter*' pnpm verdaccio
      # Defaults to the whole verdaccio namespace.
      DEBUG: ${DEBUG:-verdaccio:*}
    volumes:
      - verdaccio6x-storage:/verdaccio/storage

volumes:
  verdaccio6x-storage:
