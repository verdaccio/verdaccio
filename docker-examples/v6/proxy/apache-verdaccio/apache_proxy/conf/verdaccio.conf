ServerName localhost

<VirtualHost *:80>
    ServerName localhost

    ProxyRequests       Off
    ProxyPreserveHost   On
    AllowEncodedSlashes NoDecode

    # Allow large package tarballs through `npm publish` (0 = unlimited).
    LimitRequestBody    0

    <Proxy *>
        Require all granted
    </Proxy>

    # `nocanon` keeps the raw URL (important for scoped packages like %2f).
    # mod_proxy automatically adds the X-Forwarded-For / X-Forwarded-Host headers.
    ProxyPass            /  http://verdaccio:4873/  nocanon
    ProxyPassReverse     /  http://verdaccio:4873/

    # Log to the container's stdout/stderr.
    CustomLog /proc/self/fd/1 combined
    ErrorLog  /proc/self/fd/2
</VirtualHost>
