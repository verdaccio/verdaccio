


server {
    listen 80;
    return 302 https://$host$request_uri;
}

server {
    # `listen ... ssl` enables TLS; the standalone `ssl on;` directive was
    # removed in nginx 1.25.1, and the `http2` listen parameter is deprecated
    # in favour of the `http2` directive below.
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/nginx/cert.crt;
    ssl_certificate_key /etc/nginx/cert.key;

    ssl_session_cache  builtin:1000  shared:SSL:10m;
    ssl_protocols  TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!eNULL:!EXPORT:!CAMELLIA:!DES:!MD5:!PSK:!RC4;
    ssl_prefer_server_ciphers on;

    # nginx caps request bodies at 1 MB by default, which makes `npm publish`
    # of larger tarballs fail with HTTP 413. 0 disables the limit.
    client_max_body_size 0;

    location / {
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        # X-Forwarded-Proto lets Verdaccio emit correct https:// absolute URLs.
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_pass          XX_REMOTE_URL_XX;
        proxy_read_timeout  600;
        proxy_redirect off;
    }

    location ~ ^/verdaccio/(.*)$ {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-NginX-Proxy true;
        proxy_pass XX_REMOTE_URL_XX$1;
        proxy_redirect off;
    }
}
