upstream verdaccio_relative_v7 {
    server verdaccio_relative_path_v7:4873;
    keepalive 8;
}

upstream verdaccio_v7_root {
    server verdaccio_relative_path_v7_root:8000;
    keepalive 8;
}

server {
    listen 80 default_server;
    access_log /var/log/nginx/verdaccio.log;
    charset utf-8;

    # nginx caps request bodies at 1 MB by default, which makes `npm publish`
    # of larger tarballs fail with HTTP 413. 0 disables the limit.
    client_max_body_size 0;

    location / {
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # Verdaccio uses X-Forwarded-Proto to build correct absolute URLs
      # (tarball links, UI assets) when running behind a proxy.
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $host;
      proxy_set_header X-NginX-Proxy true;
      proxy_pass http://verdaccio_v7_root;
      proxy_redirect off;
    }

    location ~ ^/verdaccio/(.*)$ {
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $host;
      proxy_set_header X-NginX-Proxy true;
      proxy_pass http://verdaccio_relative_v7/$1;
      proxy_redirect off;
    }
}
