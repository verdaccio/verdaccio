# storage: this is generated on _helper file

auth:
  htpasswd:
    file: ./htpasswd-package

web:
  enable: true
  title: verdaccio

# load the test-only middleware plugin from this folder
plugins: ./plugins

middlewares:
  remote-user-probe:
    enabled: true

publish:
  allow_offline: false

uplinks:

log: { type: stdout, format: pretty, level: trace }

packages:
  '@*/*':
    access: $all
    publish: $all
    unpublish: none
  '**':
    access: $all
    publish: $all
    unpublish: none

_debug: true
