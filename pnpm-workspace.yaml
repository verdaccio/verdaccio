packages:
  - packages/*
  - packages/core/*
  - packages/logger/*
  - packages/plugins/audit
  - packages/plugins/auth-memory
  - packages/plugins/htpasswd
  - packages/plugins/package-filter
allowBuilds:
  esbuild: true
  unrs-resolver: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@verdaccio/*'
  - '@verdaccio-scope/*'
  - 'verdaccio-*'
  - '@typescript-eslint/*'
