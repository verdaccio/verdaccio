packages:
  - packages/*
  - packages/core/*
  - packages/tools/*
  - packages/ui/*
  - packages/server/*
  - packages/logger
  - packages/plugins/audit
  - packages/plugins/auth-memory
  - packages/plugins/htpasswd
  - packages/plugins/ui-theme
  - packages/plugins/memory
  - packages/plugins/local-storage
  - packages/plugins/package-filter
  - e2e/cli/*
allowBuilds:
  '@parcel/watcher': true
  cypress: true
  esbuild: true
  msw: true
  unrs-resolver: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@verdaccio/*'
  - '@verdaccio-scope/*'
  - 'verdaccio-*'
  # esbuild 0.28.1 is the security patch for GHSA-gv7w-rqvm-qjhr; allow it and
  # its platform packages in ahead of the 7-day quarantine so the override
  # below can resolve.
  - esbuild
  - '@esbuild/*'
  # Renovate security update: dompurify@3.4.8 || 3.4.9
  - dompurify@3.4.8 || 3.4.9

# Force the esbuild security patch (>= 0.28.1) across the whole tree.
# See GHSA-gv7w-rqvm-qjhr (RCE via NPM_CONFIG_REGISTRY, fixed in 0.28.1).
overrides:
  esbuild: '0.28.1'
  # Force the form-data CRLF-injection patch (>= 4.0.6) across the whole tree.
  # Pulled in transitively via supertest > superagent (dev only).
  # See GHSA-hmw2-7cc7-3qxx (fixed in 4.0.6).
  form-data: '>=4.0.6'
saveExact: true
ignoreScripts: true
preferFrozenLockfile: true

auditConfig:
  ignoreGhsas:
    # Express.js unreleased
    - GHSA-j3q9-mxjg-w52f
    # Express.js unreleased
    - GHSA-w7fw-mjwx-w883
