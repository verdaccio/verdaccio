allowBuilds:
  esbuild: true
  unrs-resolver: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@verdaccio/*'
  - '@verdaccio-scope/*'
  - 'verdaccio-*'
  # Renovate security update: vite@8.0.16
  - vite@8.0.16
ignoreScripts: true
saveExact: true
preferFrozenLockfile: true

auditConfig:
  ignoreGhsas:
    # Express.js unreleased
    - GHSA-j3q9-mxjg-w52f
    # Express.js unreleased
    - GHSA-w7fw-mjwx-w883
