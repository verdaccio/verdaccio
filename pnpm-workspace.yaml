packages:
  - packages/*
  - packages/core/*
  - packages/tools/*
  - packages/ui/*
  - packages/server/*
  - packages/logger
  - packages/plugins/audit
  - packages/plugins/auth-memory
  - packages/plugins/htpasswd
  - packages/plugins/ui-theme
  - packages/plugins/memory
  - packages/plugins/local-storage
  - packages/plugins/package-filter
  - e2e/cli/*
allowBuilds:
  '@parcel/watcher': true
  cypress: true
  esbuild: true
  msw: true
  unrs-resolver: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@verdaccio/*'
  - '@verdaccio-scope/*'
  - 'verdaccio-*'
saveExact: true
